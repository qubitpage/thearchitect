upstream architect_app {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name quantumqub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name quantumqub.com;

    ssl_certificate /etc/letsencrypt/live/quantumqub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantumqub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /docs/ {
        alias /opt/gdcos/public/;
        try_files $uri $uri/ =404;
        expires 30d;
    }

    location / {
        proxy_pass http://architect_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://architect_app;
        expires 365d;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
